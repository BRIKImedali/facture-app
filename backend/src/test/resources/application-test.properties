# Configuration pour les tests unitaires et d'intégration
spring.datasource.url=jdbc:h2:mem:facturation_test_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# Désactiver l'IA pendant les tests
gemini.api.key=test-key-dummy
gemini.api.url=http://localhost/dummy
